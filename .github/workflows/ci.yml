name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ecommerce -d ecommerce_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_DEBUG: false
      APP_URL: http://localhost
      BCRYPT_ROUNDS: 4
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: ecommerce_test
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      DB_SSLMODE: prefer
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      ADMIN_MFA_REQUIRED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, gd, intl, mbstring, pcntl, pdo_pgsql, pgsql, sqlite3, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run database migrations
        run: php artisan migrate --force --ansi

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test --ansi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
